<ion-header>
  <ion-toolbar color="secondary">
    <ion-title>
      {{'summary.title'|translate}}
    </ion-title>

    <ion-buttons slot="end">
      <ion-button routerLink="/home" routerDirection="root">
        {{'summary.close'|translate}}
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content>
  <ion-list>
    <ion-item>{{ summaryText }}</ion-item>
    @for (question of questions; track $index) {
      <ion-item
        (click)="goToQuestion($index)"
        [class.correct]="question.correct === true"
        [class.incorrect]="question.correct === false"
      >
        <ion-label class="ion-text-wrap">
          <span class="number">{{$index + 1}}</span>

          <span class="given-answer" lang="ja">
            {{question.givenAnswer}}
          </span>
          <app-answers [question]="question"></app-answers>
        </ion-label>

        @if (question.correct === true) {
          <ion-icon
            name="checkmark-circle"
            color="success"
            slot="end"></ion-icon>
        }
        @if (question.correct === false) {
          <ion-icon
            name="close-circle"
            color="danger"
            slot="end"></ion-icon>
        }
      </ion-item>
    }
  </ion-list>
</ion-content>
